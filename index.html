<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小涵角色卡 · xiaohanjueseka</title>
    <!-- PWA manifest 外部文件 -->
    <link rel="manifest" href="manifest.json">
    <!-- Apple 触摸图标（备用） -->
    <link rel="apple-touch-icon" href="https://i.postimg.cc/GtsZ5wrG/1770993841232.jpg">
    <!-- 自定义粉嫩字体 (来自 catbox) -->
    <link rel="stylesheet" href="https://files.catbox.moe/5ai7rx.ttf" as="font" crossorigin>
    <style>
        /* 粉白配色 + 自定义字体 */
        @font-face {
            font-family: 'PinkCharm';
            src: url('https://files.catbox.moe/5ai7rx.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PinkCharm', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #fff9fb;  /* 极浅粉 */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #app {
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 200, 220, 0.3);
        }
        /* 粉白主题变量 */
        :root {
            --pink-light: #ffe4ec;
            --pink-primary: #ffb7c5;
            --pink-deep: #ff8da1;
            --text-dark: #5e4b56;
            --text-soft: #7a5e6b;
            --bg-soft: #fff0f5;
            --white: #ffffff;
            --shadow-pink: 0 4px 12px rgba(255, 180, 200, 0.2);
        }
        .app-header {
            background: var(--white);
            padding: 8px 16px 4px;
            border-bottom: 2px solid var(--pink-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-header .left-placeholder {
            width: 0;
            flex: 0 0 0;
        }
        .header-actions {
            display: flex;
            gap: 18px;
            color: var(--pink-deep);
        }
        .header-actions i {
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.2s;
        }
        .header-actions i:hover {
            transform: scale(1.1);
            color: var(--pink-deep);
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 8px 4px;
            background: var(--bg-soft);
        }
        /* 分类栏 粉粉嫩嫩 */
        .category-tier {
            background: var(--white);
            border-radius: 24px;
            padding: 8px 12px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-pink);
            border: 1px solid var(--pink-light);
        }
        .tier-title {
            font-size: 0.7rem;
            color: var(--text-soft);
            letter-spacing: 0.2px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tier-items {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            gap: 6px;
            padding-bottom: 2px;
            scrollbar-width: none;
        }
        .tier-items::-webkit-scrollbar {
            display: none;
        }
        .category-pill {
            background: var(--pink-light);
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: var(--text-dark);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid transparent;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.1s;
        }
        .category-pill.active {
            background: var(--pink-deep);
            color: white;
            border-color: var(--pink-deep);
        }
        .category-pill .pill-actions {
            display: flex;
            gap: 2px;
            margin-left: 2px;
            font-size: 0.65rem;
        }
        .category-pill i {
            cursor: pointer;
            opacity: 0.7;
            color: var(--text-soft);
        }
        .category-pill i:hover {
            opacity: 1;
            color: var(--pink-deep);
        }
        .add-button {
            background: var(--white);
            border: 1px dashed var(--pink-primary);
            color: var(--pink-deep);
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        /* 卡片网格 9:16 图片 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 6px;
        }
        .character-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-pink);
            border: 1px solid var(--pink-light);
            transition: transform 0.1s;
            cursor: pointer;
        }
        .character-card:active { transform: scale(0.97); }
        .card-img {
            width: 100%;
            aspect-ratio: 9 / 16;  /* 9:16 比例 */
            background: var(--pink-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--pink-deep);
            object-fit: cover;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-info {
            padding: 6px 4px 8px;
        }
        .card-name {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-status {
            font-size: 0.55rem;
            color: var(--text-soft);
            margin-top: 2px;
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
        }
        .status-badge {
            background: var(--pink-light);
            padding: 1px 4px;
            border-radius: 30px;
            color: var(--text-dark);
        }
        /* 详情页 */
        .detail-container {
            padding: 0 12px 16px;
        }
        /* 图片区域 9:16 */
        .detail-img {
            width: 100%;
            aspect-ratio: 9 / 16;
            background: var(--pink-light);
            border-radius: 24px;
            margin: 10px 0 12px;
            overflow: hidden;
            box-shadow: var(--shadow-pink);
        }
        .detail-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 状态徽章 - 放在名字上方 */
        .status-charm {
            display: flex;
            justify-content: center;
            margin-bottom: 6px;
        }
        .status-badge-large {
            background: var(--pink-deep);
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 2px 8px var(--pink-primary);
            display: inline-block;
        }
        /* 角色名大号 */
        .character-name-large {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-dark);
            text-align: center;
            margin: 8px 0 12px;
            line-height: 1.2;
            letter-spacing: 1px;
        }
        /* 合并信息卡片 (作者/来源/链接) */
        .info-card {
            background: var(--white);
            border-radius: 28px;
            padding: 16px 18px;
            margin: 16px 0;
            border: 1px solid var(--pink-light);
            box-shadow: var(--shadow-pink);
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px dashed var(--pink-light);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-icon {
            width: 24px;
            color: var(--pink-deep);
            font-size: 1rem;
        }
        .info-content {
            flex: 1;
            color: var(--text-dark);
            font-size: 0.95rem;
            word-break: break-word;
        }
        /* 附件分组折叠框 */
        .attachments-section {
            margin: 20px 0;
        }
        .attachment-group {
            background: var(--white);
            border-radius: 24px;
            margin-bottom: 10px;
            border: 1px solid var(--pink-light);
            overflow: hidden;
        }
        .group-header {
            background: var(--pink-light);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }
        .group-header:hover {
            background: #ffd9e4;
        }
        .group-title {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }
        .group-title span {
            background: var(--pink-deep);
            color: white;
            border-radius: 30px;
            padding: 2px 8px;
            margin-left: 8px;
            font-size: 0.7rem;
        }
        .group-arrow {
            color: var(--pink-deep);
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .group-arrow.rotated {
            transform: rotate(90deg);
        }
        .group-files {
            padding: 8px 12px;
        }
        .file-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff5f8;
            padding: 8px 12px;
            border-radius: 20px;
            margin: 6px 0;
            border: 1px solid var(--pink-light);
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 2 1 150px;
            color: var(--text-dark);
        }
        .file-category-badge {
            background: var(--pink-deep);
            color: white;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .btn-icon {
            background: transparent;
            border: none;
            font-size: 1rem;
            color: var(--pink-deep);
            padding: 4px 6px;
            cursor: pointer;
        }
        /* 标签折叠 */
        .tag-check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
        }
        .tag-check {
            background: var(--pink-light);
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dark);
            font-size: 0.8rem;
        }
        .tag-check input {
            accent-color: var(--pink-deep);
            width: 16px; height: 16px;
        }
        .toggle-tags-btn {
            background: var(--pink-light);
            border: 1px solid var(--pink-primary);
            color: var(--pink-deep);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
        }
        /* 通用按钮 */
        button.primary {
            background: var(--pink-deep);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            width: 100%;
            margin: 16px 0;
            box-shadow: 0 4px 10px var(--pink-primary);
        }
        .bottom-delete {
            margin-top: 20px;
            text-align: center;
            color: var(--pink-deep);
            font-weight: 600;
            padding: 12px;
            border-top: 2px solid var(--pink-light);
            cursor: pointer;
        }
        .empty-state {
            text-align: center;
            color: var(--pink-primary);
            padding: 20px 0;
            grid-column: span 5;
        }
        /* 输入框、选择框粉嫩 */
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--pink-light);
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
            background: var(--white);
            color: var(--text-dark);
        }
        input:focus, select:focus {
            border-color: var(--pink-deep);
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    (function() {
        // ---------- 存储 keys ----------
        const STORAGE_CARDS = 'st_cards';
        const STORAGE_TRASH = 'st_trash';
        const STORAGE_MAIN_CATS = 'st_main_cats';
        const STORAGE_TAG_CATS = 'st_tag_cats';

        // ---------- 默认数据 ----------
        const defaultMainCats = ['单人', '多人'];
        const defaultTagCats = ['现代言情', '古代言情', '骨科/伪骨科', '年上', '年下', '仙侠', '奇幻', '悬疑', '都市', '穿越'];

        // 全局状态
        let cards = [];
        let trash = [];
        let mainCategories = [...defaultMainCats];
        let tagCategories = [...defaultTagCats];

        let selectedMain = null;
        let selectedStatus = null;
        let selectedTag = null;

        let currentView = 'home';
        let editingCardId = null;
        window._tempImage = null;
        // 控制标签展开折叠
        window._formTagsExpanded = false;

        function loadFromStorage() {
            try {
                const c = localStorage.getItem(STORAGE_CARDS);
                if (c) cards = JSON.parse(c);
                const t = localStorage.getItem(STORAGE_TRASH);
                if (t) trash = JSON.parse(t);
                const mc = localStorage.getItem(STORAGE_MAIN_CATS);
                if (mc) mainCategories = JSON.parse(mc);
                const tc = localStorage.getItem(STORAGE_TAG_CATS);
                if (tc) tagCategories = JSON.parse(tc);
            } catch (e) { console.warn('读取失败', e); }
            if (!Array.isArray(cards)) cards = [];
            if (!Array.isArray(trash)) trash = [];
            if (!Array.isArray(mainCategories) || mainCategories.length===0) mainCategories = [...defaultMainCats];
            if (!Array.isArray(tagCategories) || tagCategories.length===0) tagCategories = [...defaultTagCats];
        }
        function saveAll() {
            localStorage.setItem(STORAGE_CARDS, JSON.stringify(cards));
            localStorage.setItem(STORAGE_TRASH, JSON.stringify(trash));
            localStorage.setItem(STORAGE_MAIN_CATS, JSON.stringify(mainCategories));
            localStorage.setItem(STORAGE_TAG_CATS, JSON.stringify(tagCategories));
        }

        function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 9); }

        function render() {
            if (currentView === 'home') renderHome();
            else if (currentView === 'trash') renderTrash();
            else if (currentView === 'form') renderForm();
            else if (currentView === 'detail') renderDetail();
        }

        // ---------- 主界面 ----------
        function renderHome() {
            const filtered = cards.filter(c => {
                if (selectedMain && c.mainCategory !== selectedMain) return false;
                if (selectedStatus && c.status !== selectedStatus) return false;
                if (selectedTag && (!c.tags || !c.tags.includes(selectedTag))) return false;
                return true;
            });

            const html = `
                <div class="app-header">
                    <div class="left-placeholder"></div>
                    <div class="header-actions">
                        <i class="fas fa-plus-circle" onclick="createCard()" title="新建角色卡"></i>
                        <i class="fas fa-trash-alt" onclick="goToTrash()" title="回收站"></i>
                    </div>
                </div>
                <div class="scroll-area" id="home-scroll">
                    <div class="category-tier">
                        <div class="tier-title"> 主分类 · <span style="flex:1; text-align:right;"><i class="fas fa-plus-circle add-button" onclick="addMainCategory()"> 新增</i></span></div>
                        <div class="tier-items" id="main-cats-container">
                            <div class="category-pill ${!selectedMain ? 'active' : ''}" onclick="selectMain(null)">全部</div>
                            ${mainCategories.map(cat => `
                                <div class="category-pill ${selectedMain === cat ? 'active' : ''}">
                                    <span onclick="selectMain('${cat}')" style="cursor:pointer;">${cat}</span>
                                    <span class="pill-actions">
                                        <i class="fas fa-pen" onclick="editMainCategory('${cat}')"></i>
                                        <i class="fas fa-times" onclick="deleteMainCategory('${cat}')"></i>
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="category-tier">
                        <div class="tier-title"> 游玩状态</div>
                        <div class="tier-items">
                            <div class="category-pill ${!selectedStatus ? 'active' : ''}" onclick="selectStatus(null)">全部</div>
                            <div class="category-pill ${selectedStatus === '没玩过' ? 'active' : ''}" onclick="selectStatus('没玩过')">没玩过</div>
                            <div class="category-pill ${selectedStatus === '已玩过' ? 'active' : ''}" onclick="selectStatus('已玩过')">已玩过</div>
                            <div class="category-pill ${selectedStatus === '正在玩' ? 'active' : ''}" onclick="selectStatus('正在玩')">正在玩</div>
                        </div>
                    </div>
                    <div class="category-tier">
                        <div class="tier-title">️ 分类标签 <span style="flex:1; text-align:right;"><i class="fas fa-plus-circle add-button" onclick="addTagCategory()"> 新增</i></span></div>
                        <div class="tier-items" id="tag-cats-container">
                            <div class="category-pill ${!selectedTag ? 'active' : ''}" onclick="selectTag(null)">全部</div>
                            ${tagCategories.map(tag => `
                                <div class="category-pill ${selectedTag === tag ? 'active' : ''}">
                                    <span onclick="selectTag('${tag}')" style="cursor:pointer;">${tag}</span>
                                    <span class="pill-actions">
                                        <i class="fas fa-pen" onclick="editTagCategory('${tag}')"></i>
                                        <i class="fas fa-times" onclick="deleteTagCategory('${tag}')"></i>
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="card-grid" id="card-grid">
                        ${filtered.length === 0 ? '<div class="empty-state"> 还没有角色卡，点 + 创建</div>' : ''}
                        ${filtered.map(c => `
                            <div class="character-card" onclick="viewDetail('${c.id}')">
                                <div class="card-img">
                                    ${c.imageData ? `<img src="${c.imageData}" alt="角色">` : '<i class="fas fa-user-circle"></i>'}
                                </div>
                                <div class="card-info">
                                    <div class="card-name">${c.name || '未命名'}</div>
                                    <div class="card-status">
                                        <span class="status-badge">${c.status || '没玩过'}</span>
                                        ${c.mainCategory ? `<span class="status-badge">${c.mainCategory}</span>` : ''}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }

        window.selectMain = (cat) => { selectedMain = cat; render(); };
        window.selectStatus = (s) => { selectedStatus = s; render(); };
        window.selectTag = (t) => { selectedTag = t; render(); };
        window.goToTrash = () => { currentView = 'trash'; render(); };
        window.createCard = () => { editingCardId = null; window._tempImage = null; window._formTagsExpanded = false; currentView = 'form'; render(); };
        window.viewDetail = (id) => { editingCardId = id; currentView = 'detail'; render(); };
        window.goHome = () => { currentView = 'home'; render(); };

        window.addMainCategory = () => {
            const newName = prompt('输入新主分类名称(如: 单人)');
            if (newName && newName.trim() && !mainCategories.includes(newName.trim())) {
                mainCategories.push(newName.trim());
                saveAll(); render();
            }
        };
        window.editMainCategory = (old) => {
            const newName = prompt('修改分类名称', old);
            if (newName && newName.trim() && newName !== old) {
                const idx = mainCategories.indexOf(old);
                if (idx !== -1) {
                    mainCategories[idx] = newName.trim();
                    cards.forEach(c => { if (c.mainCategory === old) c.mainCategory = newName.trim(); });
                    trash.forEach(c => { if (c.mainCategory === old) c.mainCategory = newName.trim(); });
                    if (selectedMain === old) selectedMain = newName.trim();
                    saveAll(); render();
                }
            }
        };
        window.deleteMainCategory = (cat) => {
            if (!confirm(`删除分类“${cat}”，使用中的卡片主分类将被置空。继续？`)) return;
            mainCategories = mainCategories.filter(c => c !== cat);
            cards.forEach(c => { if (c.mainCategory === cat) c.mainCategory = ''; });
            trash.forEach(c => { if (c.mainCategory === cat) c.mainCategory = ''; });
            if (selectedMain === cat) selectedMain = null;
            saveAll(); render();
        };

        window.addTagCategory = () => {
            const newTag = prompt('输入新标签(如: 科幻)');
            if (newTag && newTag.trim() && !tagCategories.includes(newTag.trim())) {
                tagCategories.push(newTag.trim());
                saveAll(); render();
            }
        };
        window.editTagCategory = (old) => {
            const newTag = prompt('修改标签', old);
            if (newTag && newTag.trim() && newTag !== old) {
                const idx = tagCategories.indexOf(old);
                if (idx !== -1) {
                    tagCategories[idx] = newTag.trim();
                    cards.forEach(c => {
                        if (c.tags && c.tags.includes(old)) {
                            c.tags = c.tags.map(t => t === old ? newTag.trim() : t);
                        }
                    });
                    trash.forEach(c => {
                        if (c.tags && c.tags.includes(old)) {
                            c.tags = c.tags.map(t => t === old ? newTag.trim() : t);
                        }
                    });
                    if (selectedTag === old) selectedTag = newTag.trim();
                    saveAll(); render();
                }
            }
        };
        window.deleteTagCategory = (tag) => {
            if (!confirm(`删除标签“${tag}”，将从所有卡片中移除。继续？`)) return;
            tagCategories = tagCategories.filter(t => t !== tag);
            cards.forEach(c => { if (c.tags) c.tags = c.tags.filter(t => t !== tag); });
            trash.forEach(c => { if (c.tags) c.tags = c.tags.filter(t => t !== tag); });
            if (selectedTag === tag) selectedTag = null;
            saveAll(); render();
        };

        // 回收站
        function renderTrash() {
            const html = `
                <div class="app-header">
                    <h1><i class="fas fa-arrow-left" onclick="goHome()" style="margin-right:10px;"></i>回收站</h1>
                    <div></div>
                </div>
                <div class="scroll-area">
                    ${trash.length === 0 ? '<div class="empty-state">️ 回收站空空</div>' : ''}
                    <div class="card-grid" style="grid-template-columns: repeat(5, 1fr);">
                        ${trash.map(c => `
                            <div class="character-card" style="opacity:0.8;">
                                <div class="card-img">
                                    ${c.imageData ? `<img src="${c.imageData}">` : '<i class="fas fa-user-slash"></i>'}
                                </div>
                                <div class="card-info">
                                    <div class="card-name">${c.name}</div>
                                    <div style="display:flex; gap:4px; margin-top:4px;">
                                        <button class="btn-icon" onclick="restoreCard('${c.id}')" title="还原"><i class="fas fa-trash-restore"></i></button>
                                        <button class="btn-icon" onclick="permanentDelete('${c.id}')" title="永久删除"><i class="fas fa-times-circle" style="color:var(--pink-deep);"></i></button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }
        window.restoreCard = (id) => {
            const idx = trash.findIndex(c => c.id === id);
            if (idx !== -1) {
                cards.push(trash[idx]);
                trash.splice(idx, 1);
                saveAll(); renderTrash();
            }
        };
        window.permanentDelete = (id) => {
            if (confirm('彻底删除这张角色卡？不可恢复。')) {
                trash = trash.filter(c => c.id !== id);
                saveAll(); renderTrash();
            }
        };

        // 表单页 (标签折叠)
        function renderForm() {
            const card = editingCardId ? cards.find(c => c.id === editingCardId) || trash.find(c => c.id === editingCardId) : null;
            const isEdit = !!card;
            const title = isEdit ? '编辑角色卡' : '新建角色卡';

            const imageData = card ? (card.imageData || '') : (window._tempImage || '');
            const name = card ? (card.name || '') : '';
            const author = card ? (card.author || '') : '';
            const source = card ? (card.source || '') : '';
            const sourceLink = card ? (card.sourceLink || '') : '';
            const status = card ? (card.status || '没玩过') : '没玩过';
            const mainCat = card ? (card.mainCategory || (mainCategories[0] || '')) : (mainCategories[0] || '');
            const selectedTags = card ? (card.tags || []) : [];

            // 标签折叠：只显示前6个，其余隐藏
            const displayTags = window._formTagsExpanded ? tagCategories : tagCategories.slice(0, 6);
            const hiddenCount = tagCategories.length - 6;

            const html = `
                <div class="app-header">
                    <h1><i class="fas fa-arrow-left" onclick="goHome()" style="margin-right:10px;"></i>${title}</h1>
                    <div></div>
                </div>
                <div class="scroll-area detail-container">
                    <div class="detail-field">
                        <div class="field-label">角色图片 (点击上传)</div>
                        <input type="file" accept="image/*" id="uploadImageInput" style="display:none;" onchange="handleImageUpload(event)">
                        <div onclick="document.getElementById('uploadImageInput').click()" style="text-align:center;">
                            ${imageData ? `<img src="${imageData}" style="width:100%; max-height:150px; object-fit:contain; border-radius:20px;">` : '<div style="height:80px; background:var(--pink-light); border-radius:20px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-camera" style="color:var(--pink-deep);"></i> 点此上传</div>'}
                        </div>
                    </div>
                    <div class="detail-field">
                        <div class="field-label">角色名称</div>
                        <input type="text" id="cardName" value="${(name||'').replace(/"/g, '&quot;')}" placeholder="例: 江闻">
                    </div>
                    <div class="detail-field">
                        <div class="field-label">作者 (选填)</div>
                        <input type="text" id="cardAuthor" value="${(author||'').replace(/"/g, '&quot;')}">
                    </div>
                    <div class="detail-field">
                        <div class="field-label">来源 (选填)</div>
                        <input type="text" id="cardSource" value="${(source||'').replace(/"/g, '&quot;')}">
                    </div>
                    <div class="detail-field">
                        <div class="field-label">来源链接 (选填)</div>
                        <input type="url" id="cardLink" value="${(sourceLink||'').replace(/"/g, '&quot;')}">
                    </div>
                    <div class="detail-field">
                        <div class="field-label">主分类</div>
                        <select id="cardMainCat">
                            ${mainCategories.map(c => `<option value="${c}" ${mainCat === c ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>
                    </div>
                    <div class="detail-field">
                        <div class="field-label">游玩状态</div>
                        <select id="cardStatus">
                            <option ${status==='没玩过'?'selected':''}>没玩过</option>
                            <option ${status==='已玩过'?'selected':''}>已玩过</option>
                            <option ${status==='正在玩'?'selected':''}>正在玩</option>
                        </select>
                    </div>
                    <div class="detail-field">
                        <div class="field-label">标签 (可多选)</div>
                        <div class="tag-check-group" id="tagCheckGroup">
                            ${displayTags.map(tag => `
                                <label class="tag-check">
                                    <input type="checkbox" value="${tag}" ${selectedTags.includes(tag) ? 'checked' : ''}> ${tag}
                                </label>
                            `).join('')}
                        </div>
                        ${!window._formTagsExpanded && hiddenCount > 0 ? 
                            `<div class="toggle-tags-btn" onclick="window._formTagsExpanded = true; renderForm();"><i class="fas fa-chevron-down"></i> 展开全部 (${hiddenCount})</div>` : 
                            (window._formTagsExpanded ? `<div class="toggle-tags-btn" onclick="window._formTagsExpanded = false; renderForm();"><i class="fas fa-chevron-up"></i> 收起</div>` : '')}
                    </div>
                    <button class="primary" onclick="saveCard('${isEdit ? card.id : ''}')">保存角色卡</button>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }

        window.handleImageUpload = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                window._tempImage = e.target.result;
                renderForm();
            };
            reader.readAsDataURL(file);
        };

        window.saveCard = function(id) {
            const name = document.getElementById('cardName')?.value.trim() || '未命名';
            const author = document.getElementById('cardAuthor')?.value.trim() || '';
            const source = document.getElementById('cardSource')?.value.trim() || '';
            const sourceLink = document.getElementById('cardLink')?.value.trim() || '';
            const mainCat = document.getElementById('cardMainCat')?.value || mainCategories[0];
            const status = document.getElementById('cardStatus')?.value || '没玩过';
            const tagInputs = document.querySelectorAll('#tagCheckGroup input[type=checkbox]');
            const tags = [];
            tagInputs.forEach(cb => { if (cb.checked) tags.push(cb.value); });

            let imageData = window._tempImage || '';
            if (!imageData && id) {
                const old = cards.find(c => c.id === id) || trash.find(c => c.id === id);
                if (old) imageData = old.imageData || '';
            }

            const cardData = {
                id: id || uid(),
                name, author, source, sourceLink,
                mainCategory: mainCat,
                status,
                tags,
                imageData,
                files: card ? (card.files || []) : [],
                foldedGroups: card ? (card.foldedGroups || {}) : {}
            };

            if (id) {
                const idx = cards.findIndex(c => c.id === id);
                if (idx !== -1) {
                    cardData.files = cards[idx].files || [];
                    cardData.foldedGroups = cards[idx].foldedGroups || {};
                    cards[idx] = cardData;
                } else {
                    const tidx = trash.findIndex(c => c.id === id);
                    if (tidx !== -1) {
                        cardData.files = trash[tidx].files || [];
                        cardData.foldedGroups = trash[tidx].foldedGroups || {};
                        trash[tidx] = cardData;
                    }
                }
            } else {
                cards.push(cardData);
            }
            window._tempImage = null;
            window._formTagsExpanded = false;
            saveAll();
            currentView = 'home';
            render();
        };

        // 详情页 (附件分组折叠、9:16图片、美化信息)
        function renderDetail() {
            const card = cards.find(c => c.id === editingCardId) || trash.find(c => c.id === editingCardId);
            if (!card) { goHome(); return; }
            const files = card.files || [];
            // 按分类分组
            const groups = {};
            files.forEach(f => {
                const cat = f.category || '未分类';
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(f);
            });
            const sortedGroups = Object.keys(groups).sort();

            // 折叠状态
            const folded = card.foldedGroups || {};

            const html = `
                <div class="app-header">
                    <h1><i class="fas fa-arrow-left" onclick="goHome()"></i> 角色详情</h1>
                    <div class="header-actions">
                        <i class="fas fa-edit" onclick="editCard('${card.id}')" title="编辑"></i>
                        <i class="fas fa-file-import" onclick="importFiles('${card.id}')" title="导入文件"></i>
                    </div>
                </div>
                <div class="scroll-area detail-container">
                    <!-- 9:16 图片 -->
                    <div class="detail-img">
                        ${card.imageData ? `<img src="${card.imageData}">` : '<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:var(--pink-deep);"><i class="fas fa-user-circle fa-4x"></i></div>'}
                    </div>

                    <!-- 状态徽章 (名字上方) -->
                    <div class="status-charm">
                        <span class="status-badge-large">${card.status || '没玩过'}</span>
                    </div>

                    <!-- 角色名大号，无边框 -->
                    <div class="character-name-large">${card.name}</div>

                    <!-- 作者/来源/链接合并卡片 -->
                    <div class="info-card">
                        ${card.author ? `
                        <div class="info-row">
                            <div class="info-icon"><i class="fas fa-user"></i></div>
                            <div class="info-content">${card.author}</div>
                        </div>` : ''}
                        ${card.source ? `
                        <div class="info-row">
                            <div class="info-icon"><i class="fas fa-book"></i></div>
                            <div class="info-content">${card.source}</div>
                        </div>` : ''}
                        ${card.sourceLink ? `
                        <div class="info-row">
                            <div class="info-icon"><i class="fas fa-link"></i></div>
                            <div class="info-content"><a href="${card.sourceLink}" target="_blank" style="color:var(--pink-deep); text-decoration:underline;">${card.sourceLink}</a></div>
                        </div>` : ''}
                        ${!card.author && !card.source && !card.sourceLink ? '<div style="color:var(--text-soft); text-align:center;">暂无信息</div>' : ''}
                    </div>

                    <!-- 标签展示 -->
                    <div class="detail-field">
                        <div class="field-label">标签</div>
                        <div class="tag-check-group" style="margin-top:5px;">
                            ${(card.tags && card.tags.length) ? card.tags.map(t => `<span class="category-pill" style="background:var(--pink-light);">${t}</span>`).join('') : '<span class="text-soft">无</span>'}
                        </div>
                    </div>

                    <!-- 附件分组折叠框 -->
                    <div class="attachments-section">
                        <h4 style="color:var(--text-dark); margin-bottom:10px;"> 附件 (长按可分类)</h4>
                        ${sortedGroups.map(group => `
                            <div class="attachment-group">
                                <div class="group-header" onclick="toggleGroup('${card.id}', '${group}')">
                                    <span class="group-title">${group} <span>${groups[group].length}</span></span>
                                    <span class="group-arrow ${folded[group] ? '' : 'rotated'}"><i class="fas fa-chevron-right"></i></span>
                                </div>
                                ${!folded[group] ? `
                                <div class="group-files">
                                    ${groups[group].map((f, idx) => `
                                        <div class="file-row" oncontextmenu="longPressFile('${card.id}', '${group}', ${idx}, event)">
                                            <div class="file-info">
                                                <i class="fas fa-file"></i> 
                                                <span style="max-width:150px; overflow:hidden; text-overflow:ellipsis;">${f.name}</span>
                                            </div>
                                            <div style="display:flex; gap:2px;">
                                                <a download="${f.name}" href="${f.content}" style="text-decoration:none;"><i class="fas fa-download btn-icon"></i></a>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                                ` : ''}
                            </div>
                        `).join('')}
                        ${files.length === 0 ? '<div style="color:var(--text-soft);">暂无附件，点击右上角导入</div>' : ''}
                    </div>

                    <div class="bottom-delete" onclick="moveToTrash('${card.id}')">
                        <i class="fas fa-trash-alt"></i> 删除角色卡 (移至回收站)
                    </div>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
        }

        // 切换分组折叠
        window.toggleGroup = function(cardId, group) {
            const card = cards.find(c => c.id === cardId) || trash.find(c => c.id === cardId);
            if (!card) return;
            if (!card.foldedGroups) card.foldedGroups = {};
            card.foldedGroups[group] = !card.foldedGroups[group];
            saveAll();
            renderDetail();
        };

        // 长按附件分类 (传入分组名，但我们需要修改具体文件)
        window.longPressFile = function(cardId, group, fileIndex, event) {
            event.preventDefault();
            const card = cards.find(c => c.id === cardId) || trash.find(c => c.id === cardId);
            if (!card || !card.files) return;
            // 找到文件在files数组中的实际索引（需要根据分组定位）
            const files = card.files;
            const groupFiles = files.filter(f => (f.category || '未分类') === group);
            if (fileIndex >= groupFiles.length) return;
            const targetFile = groupFiles[fileIndex];
            const actualIndex = files.findIndex(f => f.name === targetFile.name && f.content === targetFile.content);
            if (actualIndex === -1) return;

            const newCategory = prompt('为附件设置分类 (输入标签，例如: 世界观)', card.files[actualIndex].category || '');
            if (newCategory !== null) {
                card.files[actualIndex].category = newCategory.trim() || '';
                saveAll();
                renderDetail();
            }
        };

        window.editCard = (id) => { editingCardId = id; window._tempImage = null; currentView = 'form'; render(); };
        window.moveToTrash = (id) => {
            const idx = cards.findIndex(c => c.id === id);
            if (idx !== -1) {
                trash.push(cards[idx]);
                cards.splice(idx, 1);
                saveAll();
                goHome();
            }
        };
        window.importFiles = (cardId) => {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = '.png,.json,.txt,.yaml,.yml';
            input.onchange = (e) => {
                const files = Array.from(e.target.files);
                const card = cards.find(c => c.id === cardId) || trash.find(c => c.id === cardId);
                if (!card) return;
                if (!card.files) card.files = [];
                Promise.all(files.map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (re) => resolve({ 
                            name: file.name, 
                            type: file.type, 
                            content: re.target.result,
                            category: ''
                        });
                        reader.readAsDataURL(file);
                    });
                })).then(results => {
                    card.files.push(...results);
                    saveAll();
                    renderDetail();
                });
            };
            input.click();
        };

        loadFromStorage();
        render();

        // PWA Service Worker 注册
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 注册成功', reg))
                    .catch(err => console.error('Service Worker 注册失败', err));
            });
        }
    })();
</script>
</body>
</html>
